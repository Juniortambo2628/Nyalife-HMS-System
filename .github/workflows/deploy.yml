name: 🚀 Deploy Nyalife HMS to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger from GitHub Actions tab

jobs:
  build:
    name: 📦 Build Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production assets
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: public/build/
          retention-days: 1

  deploy:
    name: 🚀 Deploy to cPanel
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-assets
          path: public/build/

      - name: 📂 Deploy backend to nyalife_core
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./
          server-dir: /nyalife_core/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env
            **/.env.*
            **/storage/logs/**
            **/storage/framework/sessions/**
            **/storage/framework/cache/**
            **/vendor/**
            **/*.sql
            **/docs/production/**

      - name: 🌐 Deploy public assets to public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./public/
          server-dir: /public_html/
          exclude: |
            **/index.php
            **/.htaccess
            **/storage/**

      - name: 🔧 Run post-deploy commands via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home1/nyalifew/nyalife_core

            # Install/update Composer dependencies
            composer install --no-dev --optimize-autoloader --no-interaction 2>&1

            # Run database migrations
            php artisan migrate --force

            # Rebuild caches
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            # Fix permissions
            chmod -R 775 storage
            chmod -R 775 bootstrap/cache

            echo "✅ Deployment complete at $(date)"
