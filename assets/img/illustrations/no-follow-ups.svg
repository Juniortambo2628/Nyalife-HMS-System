<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad1)" stroke="#2196f3" stroke-width="2"/>
  
  <!-- Calendar icon -->
  <rect x="70" y="60" width="60" height="50" rx="4" fill="#2196f3" stroke="#1976d2" stroke-width="2"/>
  <rect x="70" y="60" width="60" height="15" rx="4" fill="#1976d2"/>
  
  <!-- Calendar lines -->
  <line x1="75" y1="75" x2="125" y2="75" stroke="#ffffff" stroke-width="1"/>
  <line x1="75" y1="80" x2="125" y2="80" stroke="#ffffff" stroke-width="1"/>
  <line x1="75" y1="85" x2="125" y2="85" stroke="#ffffff" stroke-width="1"/>
  <line x1="75" y1="90" x2="125" y2="90" stroke="#ffffff" stroke-width="1"/>
  <line x1="75" y1="95" x2="125" y2="95" stroke="#ffffff" stroke-width="1"/>
  
  <!-- Calendar dots -->
  <circle cx="85" cy="70" r="2" fill="#ffffff"/>
  <circle cx="95" cy="70" r="2" fill="#ffffff"/>
  <circle cx="105" cy="70" r="2" fill="#ffffff"/>
  <circle cx="115" cy="70" r="2" fill="#ffffff"/>
  
  <!-- Checkmark -->
  <path d="M 85 100 L 95 110 L 115 90" stroke="#4caf50" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Text -->
  <text x="100" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666666">No Follow-ups</text>
</svg> 